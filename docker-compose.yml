services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    environment:
      - DATABASE_URL=mongodb://mongodb:27017/zadvocates?replicaSet=rs0
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:latest
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: mongosh --eval "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" --quiet
      interval: 5s
      timeout: 10s
      start_period: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - BACKEND_URL=http://backend:4001
    depends_on:
      - backend

volumes:
  mongodb_data:
